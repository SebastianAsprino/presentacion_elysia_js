services:
  express:
    build: ./express
    restart: unless-stopped

  nest:
    build: ./nest
    restart: unless-stopped

  elysia:
    build: ./elysia
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - express
      - nest
      - elysia
    restart: unless-stopped
