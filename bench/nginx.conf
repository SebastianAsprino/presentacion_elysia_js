server {
  listen 80;

  # Cada app maneja también su propio prefijo (/express, /nest, /elysia),
  # así que se hace proxy_pass sin reescribir la ruta.
  location /express {
    proxy_pass http://express:3000;
  }

  location /nest {
    proxy_pass http://nest:3000;
  }

  location /elysia {
    proxy_pass http://elysia:3000;
  }

  # runner (benchmark server-side, streaming SSE)
  location /runner/ {
    proxy_pass http://runner:3000/;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location / {
    add_header Content-Type text/plain;
    add_header Access-Control-Allow-Origin *;
    return 200 'bench gateway ok — usa /express /nest /elysia';
  }
}
