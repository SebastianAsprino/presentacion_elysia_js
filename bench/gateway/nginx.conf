server {
  listen 80;

  # Resolver interno de Docker: re-resuelve las IPs de los servicios en runtime
  # (si los contenedores se recrean en un redeploy, nginx no se queda con IPs viejas).
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Cada app maneja también su propio prefijo (/express, /nest, /elysia),
  # así que se hace proxy sin reescribir la ruta. Usar variables obliga a
  # nginx a resolver el DNS por petición en lugar de cachearlo al arrancar.
  location /express {
    set $up_express express:3000;
    proxy_pass http://$up_express;
  }

  location /nest {
    set $up_nest nest:3000;
    proxy_pass http://$up_nest;
  }

  location /elysia {
    set $up_elysia elysia:3000;
    proxy_pass http://$up_elysia;
  }

  # runner (benchmark server-side, streaming SSE)
  location /runner/ {
    set $up_runner runner:3000;
    rewrite ^/runner/(.*)$ /$1 break;
    proxy_pass http://$up_runner;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  location / {
    add_header Content-Type text/plain;
    add_header Access-Control-Allow-Origin *;
    return 200 'bench gateway ok — usa /express /nest /elysia /runner/';
  }
}
